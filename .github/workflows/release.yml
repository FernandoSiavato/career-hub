name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build artifacts
        run: python -m build
      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # The ``release`` GitHub Environment holds the PyPI trusted-publisher
    # configuration. Add the project to PyPI ``Publishing -> Add a pending
    # publisher`` with: repository=career-hub, workflow=release.yml,
    # environment=release. No API token is stored in this repo.
    environment:
      name: release
      url: https://pypi.org/p/career-hub
    permissions:
      id-token: write  # required for PyPI trusted publishing (OIDC)
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
