# career-hub config.toml
# ----------------------------------------------------------------------------
# Edit this file to match your own roles. Each role is a key under
# [roles.<key>] and tells the CLI:
#   - which sector folder to use for applications
#   - which profile file to load (looked up at $JOBSEARCH_DATA_DIR/profiles/<profile>.md)
#   - which CV template to copy when running `career-hub apply`
#
# Roles are arbitrary: pick keys that match how you actually think about
# your career (e.g. "data", "product", "meal", "growth", "research").

# default_role is used when a command needs a role but the user did not pass one
default_role = "data"

[roles.data]
sector = 1
profile = "PROFILE_DATA"
folder = "applications/data"
[roles.data.cv_templates]
en = "cvs/CV_DATA.docx"
es = "cvs/CV_DATA_ES.docx"

[roles.product]
sector = 2
profile = "PROFILE_PRODUCT"
folder = "applications/product"
[roles.product.cv_templates]
en = "cvs/CV_PRODUCT.docx"
es = "cvs/CV_PRODUCT_ES.docx"

# ----------------------------------------------------------------------------
# [scoring] — how `career-hub fit` weighs the dimensions of a fit score.
#
# Weights need not sum to 1.0; the analyzer normalizes them. If a dimension
# is not measurable for a given JD (e.g. salary not disclosed), its weight
# is redistributed proportionally across the dimensions actually scored.
#
# Comment out the entire [scoring] block to fall back to the v1 default
# (skills 0.70, experience 0.30, threshold 0.70).
# ----------------------------------------------------------------------------

[scoring]
threshold = 0.70

[scoring.weights]
skills       = 0.40
experience   = 0.20
modality     = 0.15
salary_floor = 0.10
sector_fit   = 0.15
